# KubeFoundry Kubernetes 离线部署配置文件
# 支持 AMD64/ARM64 多架构，统一配置管理
#
# 重要说明：
# 1. 镜像仓库必须独立部署在专用服务器上，不能部署在K8S集群内
# 2. 集群初始化前镜像仓库必须就绪，否则无法拉取k8s组件镜像
# 3. 镜像仓库数据必须使用本地存储，不使用NFS等共享存储，确保性能和数据一致性
# 4. 部署顺序：镜像仓库 -> K8S集群初始化 -> 添加其他组件
# 5. 这是典型的"鸡生蛋还是蛋生鸡"问题的解决方案

# ============================================================================
# 全局配置
# ============================================================================
global:
  # 基础路径配置
  base_path: "/opt/kubefoundry"
  repository_path: "repository"  # 介质包仓库根目录
  log_path: "/var/log/kubefoundry"
  temp_path: "/tmp/kubefoundry"

  # 时间和区域配置
  timezone: "Asia/Shanghai"
  ntp_servers:
    - "ntp1.aliyun.com"
    - "ntp2.aliyun.com"

  # SSH 配置 (固定 root 用户)
  ssh:
    user: "root"

  # 部署配置
  deployment:
    parallel_nodes: 5  # 并行部署节点数
    retry_count: 3     # 失败重试次数
    retry_interval: 30 # 重试间隔(秒)
    rollback_on_failure: true

# ============================================================================
# 架构配置
# ============================================================================
architecture:
  # 目标架构 (二选一)
  target: "amd64"  # amd64 或 arm64

  # 架构映射
  mapping:
    amd64:
      repository_dir: "01.AMD"
      kernel_arch: "x86_64"
      rpm_arch: "x86_64"
      platform: "linux/amd64"
    arm64:
      repository_dir: "02.ARM"
      kernel_arch: "aarch64"
      rpm_arch: "aarch64"
      platform: "linux/arm64"

# ============================================================================
# 集群节点配置
# ============================================================================
hosts:
  # 控制平面节点
  control_plane:
    - name: "k8s-master-01"
      ip: "192.168.1.10"
      ipv6: "fd00:100:1::10"
      labels:
        - "node-role.kubernetes.io/control-plane"
        - "node-role.kubernetes.io/master"
      taints:
        - "node-role.kubernetes.io/control-plane:NoSchedule"

    - name: "k8s-master-02"
      ip: "192.168.1.11"
      ipv6: "fd00:100:1::11"
      labels:
        - "node-role.kubernetes.io/control-plane"
        - "node-role.kubernetes.io/master"
      taints:
        - "node-role.kubernetes.io/control-plane:NoSchedule"

    - name: "k8s-master-03"
      ip: "192.168.1.12"
      ipv6: "fd00:100:1::12"
      labels:
        - "node-role.kubernetes.io/control-plane"
        - "node-role.kubernetes.io/master"
      taints:
        - "node-role.kubernetes.io/control-plane:NoSchedule"

  # 工作节点
  workers:
    - name: "k8s-worker-01"
      ip: "192.168.1.20"
      ipv6: "fd00:100:1::20"
      labels:
        - "node-role.kubernetes.io/worker"

    - name: "k8s-worker-02"
      ip: "192.168.1.21"
      ipv6: "fd00:100:1::21"
      labels:
        - "node-role.kubernetes.io/worker"

    - name: "k8s-worker-03"
      ip: "192.168.1.22"
      ipv6: "fd00:100:1::22"
      labels:
        - "node-role.kubernetes.io/worker"

# ============================================================================
# Kubernetes 配置
# ============================================================================
kubernetes:
  version: "1.30.0"  # Kubernetes 版本

# ============================================================================
# 容器运行时配置 (二进制安装)
# ============================================================================
container_runtime:
  # 运行时选择: docker, containerd
  type: "docker"

  # Docker 二进制安装配置
  docker:
    version: "24.0.7"
    binary_package: "docker-24.0.7.tgz"
    plugins:
      compose: "docker-compose-plugin-2.21.0.tgz"
      buildx: "docker-buildx-plugin-0.11.2.tgz"
    install_dir: "/usr/bin"
    data_dir: "/var/lib/docker"
    service_config:
      exec_start: "/usr/bin/dockerd"
      exec_reload: "/bin/kill -s HUP $MAINPID"
      exec_start_post: "/usr/sbin/iptables -P FORWARD ACCEPT"
    daemon_config:
      storage-driver: "overlay2"
      log-driver: "json-file"
      log-opts:
        max-size: "100m"
        max-file: "5"
      registry-mirrors:
        - "http://192.168.1.9:5000"
      insecure-registries:
        - "192.168.1.9:5000"

  # containerd 二进制安装配置
  containerd:
    version: "1.7.18"
    binary_package: "containerd-1.7.18-linux-{arch}.tar.gz"
    runc_binary: "runc.{arch}"
    crictl_package: "crictl-v1.29.0-linux-{arch}.tar.gz"
    install_dir: "/usr/local"
    data_dir: "/var/lib/containerd"
    config_file: "/etc/containerd/config.toml"
    service_config:
      exec_start: "/usr/local/bin/containerd"
      exec_start_pre: "/sbin/modprobe overlay"
    config_template:
      version: 2
      plugins:
        "io.containerd.grpc.v1.cri":
          sandbox_image: "registry.k8s.io/pause:3.9"
          systemd_cgroup: true
          registry:
            mirrors:
              docker.io:
                endpoint:
                  - "http://192.168.1.9:5000"

# ============================================================================
# 镜像仓库配置 (独立部署)
# ============================================================================
registry:
  # 仓库类型选择: registry, harbor
  type: "registry"  # registry 或 harbor

  # 镜像仓库部署主机配置 (独立于K8S集群，集群初始化前必须就绪)
  host:
    ip: "192.168.1.9"                    # 镜像仓库专用服务器IP
    hostname: "registry.k8s.local"       # 主机名

  # 网络配置
  network:
    port: 5000                          # Registry 服务端口
    ui_port: 5080                       # Registry UI 端口 (与实际脚本一致)
    expose_external: true               # 是否对外暴露服务
    external_ip: "192.168.1.9"          # 外部访问IP

  # 数据存储配置
  storage:
    type: "local"                       # 存储类型: local (本地存储)
    path: "/data/registry"              # 本地存储路径
    size: "500Gi"                       # 存储容量

    # 磁盘配置 (确保使用本地高性能磁盘)
    disk:
      device: "/dev/sdb"                # 专用磁盘设备 (可选)
      mount_point: "/data/registry"     # 挂载点
      filesystem: "ext4"                # 文件系统类型
      mount_options: "defaults,noatime" # 挂载选项

    # 数据目录结构
    directories:
      - "/data/registry/registry"       # Registry 镜像数据
      - "/data/registry/auth"           # 认证配置
      - "/data/registry/certs"          # SSL证书
      - "/data/registry/config"         # 配置文件
      - "/data/registry/logs"           # 日志文件

  # Docker Registry 配置 (独立部署)
  registry_config:
    image: "registry:2.7.1"              # 与实际脚本版本一致

    # 服务配置
    service:
      name: "docker-registry"
      container_name: "registry-init"   # 与脚本中的容器名一致

    # 部署配置
    deployment:
      restart_policy: "always"          # 重启策略
      privileged: false                 # 非特权模式

    # 认证配置
    auth:
      enabled: false                    # 默认不启用认证
      htpasswd_file: "/data/registry_data/auth/htpasswd"  # htpasswd文件路径
      # 脚本参数说明：
      # - 参数3: 镜像仓库用户名
      # - 参数4: 镜像仓库密码
      # - 参数5: 是否加密 (yes/no)

    # 配置文件
    config:
      file: "/data/registry_data/config.yml"  # Registry配置文件路径

    # 数据配置 (基于脚本路径)
    data:
      base_path: "/data/registry_data"       # 数据基础路径
      registry_path: "/data/registry_data/registry"  # 镜像数据路径
      auth_path: "/data/registry_data/auth"   # 认证配置路径

    # 端口映射
    ports:
      - "5000:5000"                       # Registry 服务端口

    # 环境变量 (认证模式)
    auth_environment:
      REGISTRY_AUTH: "htpasswd"
      REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
      REGISTRY_AUTH_HTPASSWD_PATH: "/etc/docker/registry/auth/htpasswd"

    # 镜像加载配置
    images:
      source_path: "/data/k8s_install/04.registry/"  # 镜像文件路径
      packages:
        - "registry-2.7.1-{arch}.tar"     # Registry镜像包
        - "registry-ui-{arch}.tar"        # Registry UI镜像包
      data_archive: "registry-{arch}.tgz" # 镜像数据归档文件

    # 脚本执行配置
    script:
      path: "/data/k8s_install/03.registry_install.sh"  # 安装脚本路径
      parameters:
        - "$1"                            # 本机IP地址
        - "$2"                            # 架构型号 (arm/amd)
        - "$3"                            # 镜像仓库用户名 (可选)
        - "$4"                            # 镜像仓库密码 (可选)
        - "$5"                            # 是否加密 (yes/no)
      # 脚本参数说明：
      # $1: 本机IP地址 (从配置文件中的 host.ip 获取)
      # $2: 架构型号 (从配置文件中的 architecture.target 获取)
      # $3-5: 认证相关参数 (当 auth.enabled=true 时需要)

  # Registry UI 配置 (独立部署)
  registry_ui:
    enabled: true
    image: "joxit/docker-registry-ui:2.2.2"  # 与脚本版本一致

    # 服务配置
    service:
      name: "registry-ui"
      container_name: "registry-ui-init"    # 与脚本中的容器名一致

    # 部署配置
    deployment:
      restart_policy: "always"              # 重启策略

    # 端口映射
    ports:
      - "5080:80"                           # UI 端口映射 (与脚本一致)

    # 环境变量 (基于脚本配置)
    environment:
      REGISTRY_TITLE: "Registry"            # Registry 标题
      REGISTRY_URL: "http://192.168.1.9:5000"  # Registry URL
      DELETE_IMAGES: true                   # 允许删除镜像

  # Harbor 配置 (独立部署，可选)
  harbor_config:
    enabled: false
    version: "v2.9.0"

    # 安装包路径
    installer: "harbor-offline-installer-v2.9.0.tgz"

    # 配置文件路径
    config_file: "/opt/harbor/harbor.yml"

    # 网络配置
    network:
      http_port: 80
      https_port: 443

    # 资源配置
    resources:
      cpu_limit: "4"
      memory_limit: "8Gi"
      cpu_request: "1"
      memory_request: "2Gi"

    # 存储配置 (本地存储)
    storage:
      type: "local"                   # 本地存储，不使用共享存储
      path: "/data/harbor"
      size: "1Ti"

    # 磁盘配置 (建议使用专用高性能磁盘)
    disk:
      device: "/dev/sdc"              # 专用磁盘设备 (可选)
      mount_point: "/data/harbor"
      filesystem: "ext4"
      mount_options: "defaults,noatime"

    # 数据库配置
    database:
      type: "postgresql"
      password: "Harbor12345"
      data_dir: "/data/harbor/database"

    # Redis 配置
    redis:
      data_dir: "/data/harbor/redis"

    # 认证配置
    auth:
      admin_password: "Harbor12345"
      mode: "db_auth"

    # SSL/TLS 配置
    tls:
      enabled: false
      cert_file: "/data/harbor/certs/server.crt"
      key_file: "/data/harbor/certs/server.key"

# ============================================================================
# 存储配置
# ============================================================================
storage:
  # NFS 存储配置
  nfs:
    server: "192.168.1.100"  # NFS 服务器地址
    path: "/data/nfs"         # NFS 导出路径
    read_only: false
    storage_class:
      name: "nfs-client"
      provisioner: "nfs.csi.k8s.io"
      parameters:
        server: "192.168.1.100"
        share: "/data/nfs"
        readOnly: "false"
    reclaim_policy: "Delete"
    volume_binding_mode: "Immediate"

  # 本地存储配置
  local:
    base_path: "/mnt/local-storage"
    storage_class:
      name: "local-storage"
      provisioner: "kubernetes.io/no-provisioner"
    reclaim_policy: "Delete"
    volume_binding_mode: "WaitForFirstConsumer"

# ============================================================================
# 网络组件配置
# ============================================================================
networking:
  # 双栈网络配置
  dual_stack:
    enabled: true
    ipv4_cidr: "192.168.0.0/16"
    ipv6_cidr: "fd00:100:64::/64"

    # IPv4 配置
    ipv4:
      enabled: true
      pod_cidr: "192.168.0.0/16"
      service_cidr: "192.96.0.0/12"
      cluster_dns: "10.96.0.10"

    # IPv6 配置
    ipv6:
      enabled: true
      pod_cidr: "fd00:100:64::/64"
      service_cidr: "fd00:100:96::/112"
      cluster_dns: "fd00:100:96::10"

    # 集群双栈配置
    cluster:
      ip_family: "IPv4Primary"  # IPv4Primary, IPv6Primary
      service_ip_dual_stack: true

  # CNI 插件选择: flannel, calico, weave
  cni: "flannel"

  # Flannel 配置 (支持双栈)
  flannel:
    version: "v0.24.2"  # 升级到支持双栈的版本
    backend: "vxlan"    # vxlan, host-gw, udp
    port: 8472
    vni: 1
    direct_routing: false

    # 双栈网络配置
    dual_stack:
      enabled: true
      ipv4_network: "192.168.0.0/16"
      ipv6_network: "fd00:100:64::/64"
      enable_ipv4: true
      enable_ipv6: true

  # Calico 配置 (可选，支持双栈)
  calico:
    version: "v3.26.0"
    ipv4_network: "192.168.0.0/16"
    ipv6_network: "fd00:100:64::/64"
    mode: "VXLAN"  # VXLAN, IPIP, BGP
    mtu: 1440

    # 双栈配置
    dual_stack:
      enabled: true
      cni_network_config:
        enable_ipv4: true
        enable_ipv6: true

  # 负载均衡器配置
  ingress:
    type: "traefik"  # traefik, nginx
    class: "traefik"

    # 双栈服务配置
    dual_stack:
      enabled: true
      ip_families: ["IPv4", "IPv6"]
      ip_family_policy: "PreferDualStack"

# ============================================================================
# 扩展组件配置
# ============================================================================
addons:
  # KubeMate Kubernetes 管理工具 (必装)
  kubemate:
    enabled: true

  # NFS Client 存储提供器 (必装)
  nfs_client:
    enabled: true

  # Prometheus 监控系统 (必装)
  prometheus:
    enabled: true

  # Traefik Ingress Controller (必装)
  traefik:
    enabled: true

  # Redis 缓存服务 (选装)
  redis:
    enabled: false

  # Loki 日志聚合系统 (选装)
  loki:
    enabled: false


# ============================================================================
# 备份配置
# ============================================================================
backup:
  # etcd 备份配置
  etcd:
    enabled: true
    schedule: "0 2 * * *"  # 每天凌晨2点
    retention: "30d"        # 保留30天
    storage_path: "/backup/etcd"
    storage_size: "10Gi"
    compression: true

  # 应用备份配置
  applications:
    enabled: false
    schedule: "0 3 * * 0"  # 每周日凌晨3点
    retention: "90d"
    storage_path: "/backup/applications"
    included_namespaces:
      - "kubefoundry"
      - "monitoring"

# ============================================================================
# 日志配置
# ============================================================================
logging:
  # 日志级别
  level: "INFO"  # DEBUG, INFO, WARN, ERROR

  # 日志轮转
  rotation:
    enabled: true
    max_size: "100M"
    max_files: 10
    max_age: "30d"

  # 日志收集
  collection:
    enabled: false
    fluentd_version: "v1.16.2"
    elasticsearch_enabled: false
    elasticsearch_version: "8.9.0"

# ============================================================================
# 验证和测试配置
# ============================================================================
validation:
  # 部署前验证
  pre_deployment:
    check_connectivity: true
    check_system_requirements: true
    check_disk_space: true
    check_dependencies: true
    check_network: true

  # 部署后验证
  post_deployment:
    check_cluster_health: true
    check_pod_status: true
    check_services: true
    check_storage: true
    check_networking: true
    run_smoke_tests: true

# ============================================================================
# 开发和调试配置
# ============================================================================
development:
  # 调试模式
  debug: false
  verbose: false

  # 测试配置
  testing:
    enabled: false
    dry_run: false
    skip_steps: []

  # 性能监控
  performance:
    monitoring_enabled: false
    metrics_collection: false